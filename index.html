<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Old Furniture - Easy Marketplace & Live Bargain Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts for Editorial Elegance -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=400;600;700&family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdfbf7',
                            100: '#f6ebd9',
                            200: '#eedab7',
                            500: '#d97706', // Amber-600
                            600: '#b45309', // Amber-700
                            800: '#92400e', // Amber-800
                            900: '#78350f', // Amber-900
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Premium Scrollbar for Chat Window */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: #f5f5f4; 
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: #b45309; 
            border-radius: 10px;
        }
        body {
            background-color: #fdfbf7;
        }
    </style>
</head>
<body class="selection:bg-brand-100 selection:text-brand-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialListings = [
            {
                id: 1,
                title: "Mid-Century Modern Lounge Chair",
                price: 250,
                condition: "Excellent",
                description: "Beautiful teak wood frame with original olive green upholstery. Minor wear consistent with age.",
                image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&w=800&q=80",
                seller: "Sarah M."
            },
            {
                id: 2,
                title: "Rustic Farmhouse Dining Table",
                price: 400,
                condition: "Good",
                description: "Solid oak wood, seats 6 comfortably. Has a lovely distressed finish.",
                image: "https://images.unsplash.com/photo-1533090481720-856c2e3e158f?auto=format&fit=crop&w=800&q=80",
                seller: "John D."
            },
            {
                id: 3,
                title: "Vintage Velvet Sofa",
                price: 650,
                condition: "Like New",
                description: "Restored 1970s velvet sofa in mustard yellow. Extremely comfortable and a great statement piece.",
                image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=800&q=80",
                seller: "Emily R."
            },
            {
                id: 4,
                title: "Antique Mahogany Bookshelf",
                price: 150,
                condition: "Fair",
                description: "Tall mahogany bookshelf. Needs a bit of polishing but structurally very sound.",
                image: "https://images.unsplash.com/photo-1594620302200-9a762244a156?auto=format&fit=crop&w=800&q=80",
                seller: "Mike T."
            }
        ];

        // Chat Widget Component
        const ChatWidget = ({ isOpen, setIsOpen, activeItem, chatMode, setChatMode }) => {
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Auto-scroll chat to bottom
            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, isOpen, isTyping]);

            // React dynamically to Mode changes (Buy or Sell) or selected item
            useEffect(() => {
                if (!isOpen) return;

                if (chatMode === 'sell') {
                    setMessages([
                        { 
                            sender: 'agent', 
                            text: "Hello! Ready to sell your furniture? Let me know what you are listing (e.g. sofa, chair, table) and your desired price, or select a quick option below!" 
                        }
                    ]);
                } else if (chatMode === 'buy' && activeItem) {
                    setMessages([
                        { 
                            sender: 'agent', 
                            text: `Hi there! I'm here to help you get the best deal on the "${activeItem.title}". The current asking price is $${activeItem.price}. What offer do you have in mind?` 
                        }
                    ]);
                } else {
                    setMessages([
                        { 
                            sender: 'agent', 
                            text: "Hello! Welcome to Sell Old Furniture. I can help you purchase vintage items, bargain prices, or instantly list your own furniture. How can I assist you?" 
                        }
                    ]);
                }
            }, [activeItem, isOpen, chatMode]);

            // Clever response logic to handle bargaining & listings instantly
            const processInstantReply = (userInputText) => {
                setIsTyping(true);
                
                setTimeout(() => {
                    setIsTyping(false);
                    const cleanText = userInputText.toLowerCase();
                    let reply = "";

                    if (chatMode === 'sell') {
                        if (cleanText.includes("sofa") || cleanText.includes("couch") || cleanText.includes("chair") || cleanText.includes("table") || cleanText.includes("cabinet") || cleanText.includes("list")) {
                            reply = `Excellent! To finalize listing your item, set up images, and get it published directly on our homepage, please dial our specialist line: +18052631274. We're ready to list it for you right now!`;
                        } else if (cleanText.match(/\d+/g)) {
                            reply = `Perfect! Price noted. Let's make this live. Give us a quick ring at +18052631274 so we can verify details and list your furniture immediately!`;
                        } else {
                            reply = `Wonderful! To secure your listing and speak to a direct representative, please call us at +18052631274. We are available to help you upload and post today!`;
                        }
                    } else {
                        const itemPrice = activeItem ? activeItem.price : 200;
                        const itemName = activeItem ? activeItem.title : "this piece";
                        const numbersInText = cleanText.match(/\d+/g);
                        const numericOffer = numbersInText ? parseInt(numbersInText[0]) : null;

                        if (cleanText.includes("available")) {
                            reply = `Yes! The ${itemName} is still available and ready for immediate local pick-up. Would you like to make an offer?`;
                        } else if (cleanText.includes("deliver") || cleanText.includes("shipping")) {
                            reply = "We offer convenient warehouse pick-up and local delivery assistance. Call us directly at +18052631274 to confirm local shipping rates!";
                        } else if (numericOffer) {
                            const minAcceptablePrice = itemPrice * 0.8; // 20% max discount rule

                            if (numericOffer >= itemPrice) {
                                reply = `Terrific! We accept $${numericOffer} for the "${itemName}". Let's finalize your purchase! Call us immediately at +18052631274 to schedule pickup.`;
                            } else if (numericOffer >= minAcceptablePrice) {
                                reply = `That is a fair offer! We can agree on $${numericOffer} for "${itemName}". Please call +18052631274 to secure your purchase and organize pickup!`;
                            } else {
                                const counterPrice = Math.round(itemPrice * 0.9);
                                reply = `A bit too low for a genuine vintage piece! The absolute best we can do is split the difference at $${counterPrice}. Call +18052631274 to lock in this special rate!`;
                            }
                        } else {
                            reply = `Got it! To ask more details, finalize buying, or arrange delivery for the "${itemName}", feel free to call us at +18052631274! We are always ready to assist.`;
                        }
                    }

                    setMessages(prev => [...prev, { sender: 'agent', text: reply }]);
                }, 800);
            };

            const handleSend = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;

                const userMsg = inputValue;
                setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setInputValue('');
                processInstantReply(userMsg);
            };

            const handleQuickAction = (actionText) => {
                setMessages(prev => [...prev, { sender: 'user', text: actionText }]);
                processInstantReply(actionText);
            };

            if (!isOpen) {
                return (
                    <button 
                        onClick={() => {
                            setChatMode('buy');
                            setIsOpen(true);
                        }}
                        className="fixed bottom-6 right-6 bg-brand-600 text-white py-4 px-6 rounded-full shadow-2xl hover:bg-brand-500 transition-all z-50 flex items-center justify-center gap-2 transform hover:scale-105"
                    >
                        <i className="fa-solid fa-comments text-xl"></i>
                        <span className="text-sm font-bold">Negotiate or List Furniture</span>
                    </button>
                );
            }

            return (
                <div className="fixed bottom-6 right-6 w-92 max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-2xl overflow-hidden z-50 flex flex-col border border-stone-200" style={{ height: '520px' }}>
                    
                    {/* Header */}
                    <div className="bg-brand-900 text-white p-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-brand-600 flex items-center justify-center font-bold text-white">
                                <i className="fa-solid fa-user-tie text-sm"></i>
                            </div>
                            <div>
                                <h3 className="font-semibold text-sm">Live Agent Assistant</h3>
                                <p className="text-[11px] text-brand-100 font-medium">
                                    {chatMode === 'sell' ? "Listing Assistant Active" : "Buyer Price Bargain Active"}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            {/* Toggle chat context */}
                            <button 
                                onClick={() => setChatMode(chatMode === 'buy' ? 'sell' : 'buy')}
                                className="text-[11px] bg-brand-600 hover:bg-brand-500 text-white px-2.5 py-1 rounded font-semibold transition-all mr-2"
                            >
                                {chatMode === 'buy' ? "Switch to Sell" : "Switch to Buy"}
                            </button>
                            <button onClick={() => setIsOpen(false)} className="text-stone-300 hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark text-lg"></i>
                            </button>
                        </div>
                    </div>

                    {/* Messages Area */}
                    <div className="flex-1 p-4 overflow-y-auto bg-stone-50 chat-scroll flex flex-col gap-3">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] rounded-2xl p-3 text-sm ${
                                    msg.sender === 'user' 
                                    ? 'bg-brand-600 text-white rounded-br-none shadow-sm' 
                                    : 'bg-white border border-stone-200 text-stone-800 rounded-bl-none shadow-sm'
                                }`}>
                                    {msg.text}
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex justify-start">
                                <div className="bg-white border border-stone-200 text-stone-500 rounded-2xl p-3 text-sm shadow-sm flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce"></span>
                                    <span className="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                    <span className="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                </div>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>

                    {/* Quick Helper Actions */}
                    {chatMode === 'sell' ? (
                        <div className="bg-stone-100 px-3 py-2 border-t border-stone-200 flex flex-wrap gap-1.5 items-center">
                            <span className="text-[10px] uppercase font-bold text-stone-500">I want to list:</span>
                            <button 
                                onClick={() => handleQuickAction("🛋️ I want to list a Couch / Sofa")}
                                className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                            >
                                Couch
                            </button>
                            <button 
                                onClick={() => handleQuickAction("🪑 I want to list a Vintage Chair")}
                                className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                            >
                                Chair
                            </button>
                            <button 
                                onClick={() => handleQuickAction("🪵 I want to list a Table or Cabinet")}
                                className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                            >
                                Table/Cabinet
                            </button>
                        </div>
                    ) : (
                        activeItem && (
                            <div className="bg-stone-100 px-3 py-2 border-t border-stone-200 flex flex-wrap gap-1.5 items-center">
                                <span className="text-[10px] uppercase font-bold text-stone-500">Quick Offer:</span>
                                <button 
                                    onClick={() => handleQuickAction(`Is the "${activeItem.title}" still available?`)}
                                    className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                                >
                                    Availability?
                                </button>
                                <button 
                                    onClick={() => handleQuickAction(`Would you take $${Math.round(activeItem.price * 0.9)}? (10% Off)`)}
                                    className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                                >
                                    Offer -10%
                                </button>
                                <button 
                                    onClick={() => handleQuickAction(`Can I buy it for $${Math.round(activeItem.price * 0.8)}? (20% Off)`)}
                                    className="text-xs bg-white border border-stone-300 hover:border-brand-500 text-stone-700 px-2 py-1 rounded-md transition-all shadow-sm"
                                >
                                    Offer -20%
                                </button>
                            </div>
                        )
                    )}

                    {/* Input bar */}
                    <form onSubmit={handleSend} className="p-3 bg-white border-t border-stone-200 flex gap-2">
                        <input 
                            type="text" 
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            placeholder={chatMode === 'sell' ? "Type item name & target price..." : "Type custom price or message..."} 
                            className="flex-1 px-4 py-2.5 rounded-full border border-stone-300 focus:outline-none focus:ring-1 focus:ring-brand-500 text-sm"
                            disabled={isTyping}
                        />
                        <button 
                            type="submit" 
                            className="bg-brand-600 text-white w-10 h-10 rounded-full hover:bg-brand-500 flex items-center justify-center transition-colors shadow" 
                            disabled={!inputValue.trim() || isTyping}
                        >
                            <i className="fa-solid fa-paper-plane text-xs"></i>
                        </button>
                    </form>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [listings, setListings] = useState(initialListings);
            const [chatOpen, setChatOpen] = useState(false);
            const [activeItem, setActiveItem] = useState(initialListings[0]);
            const [chatMode, setChatMode] = useState('buy');
            const [notification, setNotification] = useState(null);

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 4000);
            };

            const handleNegotiate = (item) => {
                setActiveItem(item);
                setChatMode('buy');
                setChatOpen(true);
            };

            // Seamless direct-to-chat list workflow
            const handleStartListingChat = () => {
                setChatMode('sell');
                setChatOpen(true);
                showNotification("Connecting to Live Agent... Tell us what old furniture you want to list!");
            };

            return (
                <div className="min-h-screen flex flex-col font-sans text-stone-800">
                    
                    {/* Floating Toast Notification Box */}
                    {notification && (
                        <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 bg-stone-900 text-white px-6 py-3.5 rounded-full shadow-2xl transition-all border border-stone-700">
                            <i className="fa-solid fa-comment-dots text-amber-500"></i>
                            <span className="font-semibold text-xs sm:text-sm">{notification}</span>
                        </div>
                    )}

                    {/* Navigation Header */}
                    <nav className="bg-white/95 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40 transition-shadow">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-20">
                                <div className="flex items-center cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                    <i className="fa-solid fa-couch text-brand-600 text-3xl mr-3"></i>
                                    <h1 className="font-serif font-bold text-xl sm:text-2xl text-brand-900 tracking-tight">Sell Old Furniture</h1>
                                </div>
                                <div className="flex items-center space-x-3 sm:space-x-6">
                                    <button 
                                        onClick={() => window.scrollTo({top: 550, behavior: 'smooth'})} 
                                        className="px-2 sm:px-3 py-2 font-semibold text-sm text-stone-600 hover:text-brand-600 transition-colors"
                                    >
                                        Browse Items
                                    </button>
                                    
                                    {/* List furniture triggers chat immediately */}
                                    <button 
                                        onClick={handleStartListingChat} 
                                        className="px-3 py-2 font-bold text-xs sm:text-sm text-brand-900 hover:text-brand-950 flex items-center gap-2 bg-brand-100 border border-brand-200 rounded-xl hover:bg-brand-200 transition-all"
                                    >
                                        <i className="fa-solid fa-tag text-brand-600"></i>
                                        List Your Furniture
                                    </button>
                                    
                                    <a 
                                        href="tel:+18052631274" 
                                        className="hidden lg:flex items-center gap-2 bg-brand-600 px-5 py-2.5 rounded-full text-white font-bold hover:bg-brand-500 transition-colors shadow-sm"
                                    >
                                        <i className="fa-solid fa-phone"></i>
                                        +1 (805) 263-1274
                                    </a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Premium Hero Section */}
                    <div className="relative bg-stone-900 text-white overflow-hidden py-20 sm:py-28">
                        <div className="absolute inset-0">
                            <img src="https://images.unsplash.com/photo-1618220179428-22790b46a0eb?auto=format&fit=crop&w=1920&q=80" alt="Exquisite Vintage Furniture" className="w-full h-full object-cover opacity-35" />
                            <div className="absolute inset-0 bg-gradient-to-t from-stone-950/80 via-transparent to-transparent"></div>
                        </div>
                        <div className="relative max-w-4xl mx-auto px-4 text-center">
                            <span className="inline-block bg-brand-600/90 text-white text-[11px] font-bold tracking-widest uppercase px-3.5 py-1.5 rounded-full mb-6">Immediate Cash & Trade Offers</span>
                            <h2 className="text-4xl sm:text-6xl font-serif font-bold mb-5 leading-tight">Turn Old Furniture into Fast Cash</h2>
                            <p className="text-stone-300 text-sm sm:text-lg max-w-2xl mx-auto mb-10 leading-relaxed">
                                The easiest local platform to buy, sell, or bargain for high-grade classic and modern furniture. Chat directly with our negotiator agent to list your piece or slash prices today!
                            </p>
                            
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                                <button 
                                    onClick={handleStartListingChat} 
                                    className="w-full sm:w-auto bg-brand-600 hover:bg-brand-500 text-white font-bold py-4 px-8 rounded-xl transition-all flex items-center justify-center gap-2 transform hover:scale-105 shadow-lg text-sm sm:text-base"
                                >
                                    <i className="fa-solid fa-comments"></i>
                                    List Your Furniture (Go to Chat)
                                </button>
                                
                                <a 
                                    href="tel:+18052631274" 
                                    className="w-full sm:w-auto bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-4 px-8 rounded-xl flex items-center gap-2 justify-center transition-all text-sm sm:text-base"
                                >
                                    <i className="fa-solid fa-phone"></i>
                                    Call Hotline: +18052631274
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Grid Section for Items */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                        <div className="mb-10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                            <div>
                                <h3 className="text-3xl font-serif font-bold text-brand-900">Featured Vintage Furniture</h3>
                                <p className="text-stone-500 text-sm mt-1">Found something you love? Hit "Negotiate Price" to slash prices and get a deal instantly.</p>
                            </div>
                            <button 
                                onClick={handleStartListingChat}
                                className="self-start sm:self-center bg-brand-50 hover:bg-brand-100 border border-brand-200 text-brand-900 font-bold px-5 py-3 rounded-xl text-sm transition-all flex items-center gap-2"
                            >
                                <i className="fa-solid fa-plus text-brand-600"></i> Got items to sell? List here
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {listings.map(item => (
                                <div key={item.id} className="bg-white rounded-2xl overflow-hidden border border-stone-200 flex flex-col hover:shadow-xl transition-shadow duration-300">
                                    <div className="relative h-60 bg-stone-100">
                                        <img src={item.image} alt={item.title} className="w-full h-full object-cover" />
                                        <div className="absolute bottom-4 right-4 bg-brand-900 text-white font-bold px-4 py-1.5 rounded-lg text-sm shadow-md">
                                            Asking: ${item.price}
                                        </div>
                                    </div>
                                    <div className="p-6 flex-1 flex flex-col">
                                        <h4 className="font-bold text-xl text-stone-900 mb-1.5">{item.title}</h4>
                                        <div className="flex gap-2 mb-4 text-xs">
                                            <span className="bg-brand-50 text-brand-900 font-bold px-2.5 py-1 rounded border border-brand-100">
                                                Condition: {item.condition}
                                            </span>
                                            <span className="text-stone-500 self-center">
                                                by {item.seller}
                                            </span>
                                        </div>
                                        <p className="text-stone-600 text-sm line-clamp-3 mb-6 flex-1 leading-relaxed">{item.description}</p>
                                        <button 
                                            onClick={() => handleNegotiate(item)}
                                            className="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-sm"
                                        >
                                            <i className="fa-regular fa-comments"></i>
                                            Negotiate Price
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Sell Workflow Steps */}
                    <div className="bg-stone-100 py-16 border-y border-stone-200">
                        <div className="max-w-6xl mx-auto px-4">
                            <h3 className="text-2xl sm:text-3xl font-serif font-bold text-center text-brand-900 mb-12">How to Sell Your Furniture in 3 Steps</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="bg-white p-8 rounded-2xl border border-stone-200 text-center shadow-sm relative">
                                    <div className="w-12 h-12 bg-brand-100 text-brand-900 rounded-full flex items-center justify-center font-bold text-lg mx-auto mb-5 border border-brand-200">1</div>
                                    <h4 className="font-bold text-lg text-stone-900 mb-2">Initiate Chat</h4>
                                    <p className="text-xs sm:text-sm text-stone-500 leading-relaxed">Click any "List Your Furniture" button to launch the live assistant instantly.</p>
                                </div>
                                <div className="bg-white p-8 rounded-2xl border border-stone-200 text-center shadow-sm relative">
                                    <div className="w-12 h-12 bg-brand-100 text-brand-900 rounded-full flex items-center justify-center font-bold text-lg mx-auto mb-5 border border-brand-200">2</div>
                                    <h4 className="font-bold text-lg text-stone-900 mb-2">Provide Details</h4>
                                    <p className="text-xs sm:text-sm text-stone-500 leading-relaxed">Let the chat assistant know the type of furniture, condition, and desired sale price.</p>
                                </div>

                            <a

                    <footer className="bg-stone-950 text-stone-300 py-12 border-t border-stone-900 text-sm">

                                <div className="flex items-center mb-4">
                                    <i className="fa-solid fa-couch text-brand-500 text-2xl mr-2"></i>
                                    <h3 className="font-serif font-bold text-white text-xl">Sell Old Furniture</h3>
                                </div>

                                <ul className="space-y-3 text-xs sm:text-sm">
                                    <li className="flex items-center gap-2.5">
                                        <i className="fa-solid fa-phone text-brand-500"></i>
                                        <a href="tel:+18052631274" className="text-white font-bold hover:underline">+1 (805) 263-1274</a>
                                    </li>
                                    <li className="flex items-center gap-2.5">
                                        <i className="fa-solid fa-envelope text-brand-500"></i>
                                        <span>listings@selloldfurniture.com</span>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-4">Quick Links</h4>
                                <div className="flex flex-col gap-2.5 text-xs sm:text-sm">
                                    <button onClick={() => window.scrollTo({top: 550, behavior: 'smooth'})} className="hover:text-white underline text-left">Browse Listings</button>
                                    <button onClick={handleStartListingChat} className="hover:text-white underline text-left">List My Old Furniture (via Chat)</button>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 pt-6 border-t border-stone-800 text-center text-stone-500 text-xs">
                            <p>&copy; 2026 Sell Old Furniture. All rights reserved.</p>
                        </div>
                    </footer>

                    {/* Active Live Chat Widget */}
                    <ChatWidget 
                        isOpen={chatOpen} 
                        setIsOpen={setChatOpen} 
                        activeItem={activeItem} 
                        chatMode={chatMode}
                        setChatMode={setChatMode}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
